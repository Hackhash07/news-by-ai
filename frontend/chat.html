<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade Trends — Live Desk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body class="chat-layout">
    
    <nav class="topnav" role="navigation" aria-label="Main navigation">
        <div class="nav-inner">
            <a href="index.html" class="brand" aria-label="Trade Trends home">
                <div class="brand-mark" aria-hidden="true">TT</div>
                <div class="brand-text">
                    <span class="brand-name">TRADE TRENDS</span>
                    <span class="brand-sub">Market Intelligence</span>
                </div>
            </a>
            <div class="nav-links" role="list">
                <a href="index.html" class="nav-link" role="listitem">Intelligence</a>
                <a href="chat.html" class="nav-link active" role="listitem">Live Desk</a>
                <a href="profile.html#watchlists" class="nav-link" role="listitem">Watchlist</a>
                <a href="profile.html#saved" class="nav-link" role="listitem">Saved</a>
            </div>
		    <div class="nav-right">
                <div class="ticker-time" id="ticker-time" style="margin-right:20px;">--:--:--</div>
                <a href="profile.html" class="nav-avatar-link">
                    <div class="nav-avatar" id="nav-avatar">?</div>
                </a>
	        </div>
        </div>
    </nav>

    <!-- AUTH GATE -->
    <div id="auth-gate" class="auth-overlay" hidden>
        <div class="auth-modal">
            <div class="auth-brand">
                <div class="brand-mark" aria-hidden="true">TT</div>
                <h2>Live Desk Authentication</h2>
                <p>Join the conversation with other verified traders.</p>
            </div>
            
            <div id="auth-step-1" class="auth-step">
                <button id="google-login-btn" class="google-btn">Sign in with Google</button>
            </div>
            
            <div id="auth-step-2" class="auth-step" hidden>
                <h3>Complete your profile</h3>
                <div class="auth-preview">
                    <div id="auth-google-avatar" class="auth-google-avatar"></div>
                    <div>
                        <div id="auth-google-name" class="auth-google-name"></div>
                        <div id="auth-google-email" class="auth-google-email"></div>
                    </div>
                </div>
                
                <div class="auth-form">
                    <label class="auth-label">
                        Display Name
                        <input id="setup-display-name" type="text" class="auth-input" placeholder="e.g. John Doe" />
                    </label>
                    
                    <label class="auth-label">
                        Trading Handle
                        <div class="auth-input-group">
                            <span class="auth-addon">@</span>
                            <input id="setup-username" type="text" class="auth-input" placeholder="e.g. jdoe_trades" />
                        </div>
                        <span id="handle-hint" class="auth-field-hint"></span>
                    </label>
                    
                    <button id="complete-profile-btn" class="auth-submit-btn">Enter Live Desk →</button>
                </div>
            </div>
        </div>
    </div>

    <main class="chat-shell">
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h3>Live Desk</h3>
            </div>
            
            <div class="room-list" id="chat-rooms">
                <button class="room-btn active" data-room="global" type="button">
                  <span class="room-name">Global Markets</span>
                  <span class="room-desc">Equities, bonds, and macro</span>
                </button>
                <button class="room-btn" data-room="crypto" type="button">
                  <span class="room-name">Crypto Assets</span>
                  <span class="room-desc">BTC, ETH, and altcoins</span>
                </button>
                <button class="room-btn" data-room="nifty" type="button">
                  <span class="room-name">NIFTY 50</span>
                  <span class="room-desc">Indian markets discussion</span>
                </button>
            </div>
            
            <div class="sidebar-profile">
                <div class="sp-info">
                    <div id="widget-avatar" class="sp-avatar">U</div>
                    <div class="sp-text">
                        <strong id="widget-display-name">Trader</strong>
                        <span id="widget-handle">@user</span>
                    </div>
                </div>
                <div class="sp-actions">
                    <button id="signout-btn" class="sp-action-btn">Sign Out</button>
                </div>
            </div>
        </aside>

        <section class="chat-main">
            <header class="chat-header">
                <div>
                    <h2 id="room-title">Global Markets</h2>
                    <p id="room-description">Equities, bonds, and macro</p>
                </div>
                <div class="chat-status" id="chat-status">Connecting...</div>
            </header>
            
            <div class="chat-messages" id="chat-messages"></div>
            
            <footer class="chat-composer">
                <form id="chat-form" class="composer-form">
                    <input id="chat-input" type="text" class="composer-input" placeholder="Share a signal or insight..." autocomplete="off" />
                    <button type="submit" class="composer-send" aria-label="Send message">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                    </button>
                </form>
            </footer>
        </section>
    </main>
    
    <script type="module" src="chat.js"></script>
</body>
</html>
