<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7XKPPMDQJW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-7XKPPMDQJW');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Trends — Admin</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #0b1020;
      color: #e5e7eb;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .panel {
      width: min(560px, calc(100vw - 32px));
      background: #11182b;
      border: 1px solid #24304a;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 20px;
      color: #94a3b8;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid #334155;
      padding: 14px 16px;
      font-size: 16px;
      background: #0f172a;
      color: #e5e7eb;
      outline: none;
    }
    input { margin-bottom: 12px; }
    button {
      background: #2563eb;
      border-color: #2563eb;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      opacity: .65;
      cursor: not-allowed;
    }
    #status {
      margin-top: 16px;
      min-height: 24px;
      color: #93c5fd;
    }
    .small {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Trade Trends Admin</h1>
    <p>Fetch and classify fresh news on the server.</p>

    <input id="secret" type="password" placeholder="Update secret" />
    <button id="updateBtn" onclick="updateNews()">Fetch &amp; Classify News</button>

    <div id="status"></div>

    <div class="small">
      Set <strong>UPDATE_SECRET</strong> and <strong>GEMINI_API_KEY</strong> in Render environment variables.
    </div>
  </div>

  <div class="panel" style="margin-top: 24px;">
    <h1>Manual Evaluation</h1>
    <p>Manually grade signals that failed to evaluate automatically.</p>
    <button id="loadPendingBtn" onclick="loadPendingSignals()">Load Pending Signals</button>
    <div id="pendingContainer" style="margin-top: 16px;"></div>
  </div>

  <script>
    async function updateNews() {
      const secret = document.getElementById("secret").value.trim();
      const btn = document.getElementById("updateBtn");
      const status = document.getElementById("status");

      if (!secret) {
        status.textContent = "Enter the update secret first.";
        return;
      }

      btn.disabled = true;
      status.textContent = "Updating...";

      try {
        const res = await fetch(`/update-news?secret=${encodeURIComponent(secret)}`, {
          cache: "no-store"
        });
        const data = await res.json();

        if (!res.ok) {
          status.textContent = data.error || "Update failed";
          return;
        }

        status.textContent = `Updated successfully.`;
      } catch (e) {
        status.textContent = `Network error: ${e.message}`;
      } finally {
        btn.disabled = false;
      }
    }

    async function loadPendingSignals() {
      const secret = document.getElementById("secret").value.trim();
      const container = document.getElementById("pendingContainer");
      if (!secret) {
        container.innerHTML = "<div style='color:#ef4444'>Enter the update secret first.</div>";
        return;
      }

      container.innerHTML = "Loading...";
      try {
        const res = await fetch(`/api/admin/pending-signals?secret=${encodeURIComponent(secret)}`);
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || "Failed to load");
        if (!data.signals || data.signals.length === 0) {
            container.innerHTML = "<div>No pending signals found.</div>";
            return;
        }

        let html = '';
        data.signals.forEach(sig => {
            const date = new Date(sig.signal_timestamp).toLocaleString();
            const title = sig.news ? sig.news.title : 'Unknown News';
            html += `
              <div id="sig-${sig.id}" style="background: #1e293b; padding: 16px; border-radius: 8px; margin-bottom: 12px; font-size: 14px;">
                <div style="font-weight: bold; margin-bottom: 4px;">${sig.ticker} (${sig.signal_direction})</div>
                <div style="color: #94a3b8; margin-bottom: 8px;">${date}</div>
                <div style="color: #94a3b8; margin-bottom: 12px; font-style: italic;">${title}</div>
                <div style="display: flex; gap: 8px;">
                  <select id="sel-${sig.id}" style="flex: 1; padding: 8px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 6px;">
                    <option value="">Select Outcome...</option>
                    <option value="Correct">Correct</option>
                    <option value="Incorrect">Incorrect</option>
                    <option value="Neutral">Neutral</option>
                  </select>
                  <button onclick="submitEval('${sig.id}')" style="width: auto; padding: 8px 16px;">Submit</button>
                </div>
              </div>
            `;
        });
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `<div style='color:#ef4444'>${e.message}</div>`;
      }
    }

    async function submitEval(id) {
      const secret = document.getElementById("secret").value.trim();
      const outcome = document.getElementById(`sel-${id}`).value;
      if (!outcome) {
        alert("Select an outcome first");
        return;
      }

      try {
        const res = await fetch("/api/admin/manual-evaluate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ secret, id, outcome })
        });
        if (!res.ok) {
           const err = await res.json();
           throw new Error(err.error || "Failed to submit");
        }
        
        document.getElementById(`sig-${id}`).remove();
      } catch (e) {
        alert(e.message);
      }
    }
  </script>
</body>
</html>
